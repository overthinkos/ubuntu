#  Per-kind file for vm entries. Sibling of overthink.yml — included via
#  overthink.yml's `includes:` list. The schema kind discriminator is
#  `kind: vm` for kind-keyed entries; root-shape map is `vm:` (this file).
#  2026-05 kind-files cutover.
version: 2026.156.557
vm:
    ubuntu-debootstrap:
        # Bootstrap-from-scratch via debootstrap inside the ubuntu-debootstrap-
        # builder container, then booted under libvirt/QEMU. The debootstrap
        # builder template + distro.ubuntu config (which inherits debian) resolve
        # from the imported build.yml.
        source:
            kind: bootstrap
            builder: debootstrap
            builder_image: ubuntu-debootstrap-builder
            distro: ubuntu
            package:
                - sudo
                - openssh-server
                - qemu-guest-agent
                - cloud-init
            rootfs: ext4
            kernel_args: console=tty0 console=ttyS0,115200
        disk_size: 20G
        ram: 4G
        cpu: 2
        machine: q35
        firmware: uefi-insecure
        network:
            mode: user
        ssh:
            user: ubuntu
            # 12229 (not 12228): the cachyos-gpu operator VM forwards host
            # 12228; the disposable ubuntu bed moves so it can run alongside
            # the operator. See CHANGELOG (2026-05 VM host-port deconfliction).
            port: 12229
            key_source: generate
        cloud_init:
            # The ubuntu account (sudo NOPASSWD + /bin/bash + ssh key +
            # wheel/sudo) is provisioned from ssh.user via the cloud-init
            # create-pattern (composeUsers), so no explicit users: block is
            # needed here.
            runcmd:
                - systemctl enable --now ssh
                - systemctl enable --now qemu-guest-agent
                - "{ ip a; echo ===listen===; ss -tlnp; echo ===ssh===; systemctl status ssh --no-pager; } > /boot/ov-diag.txt 2>&1"
