#  Ubuntu bootstrap VM, split out of the main overthink repo (2026-05).
#  `source.kind: bootstrap` builds an Ubuntu rootfs from scratch via debootstrap
#  inside the ubuntu-debootstrap-builder container, then boots it under
#  libvirt/QEMU. The debootstrap builder template + distro.ubuntu config (which
#  inherits debian) resolve from the remote-included build.yml.
version: 2026.141.1600
vm:
    ubuntu-debootstrap:
        source:
            kind: bootstrap
            builder: debootstrap
            builder_image: ubuntu-debootstrap-builder
            distro: ubuntu
            package:
                - sudo
                - openssh-server
                - qemu-guest-agent
                - cloud-init
            rootfs: ext4
            kernel_args: console=tty0 console=ttyS0,115200
        disk_size: 20G
        ram: 4G
        cpu: 2
        machine: q35
        firmware: uefi-insecure
        network:
            mode: user
        ssh:
            user: ubuntu
            port: 12228
            key_source: generate
        cloud_init:
            user:
                - name: ubuntu
                  sudo: true
                  shell: /bin/bash
            runcmd:
                - systemctl enable --now ssh
                - systemctl enable --now qemu-guest-agent
                - "{ ip a; echo ===listen===; ss -tlnp; echo ===ssh===; systemctl status ssh --no-pager; } > /boot/ov-diag.txt 2>&1"
