ubuntu:
    box:
        # Bare distro base on ubuntu:24.04 (layerless) — carries a dedicated version:
        # for content-stable identity (cache stability), per the per-kind versioning.
        version: 2026.144.1443
        base: ubuntu:24.04
        build:
            - deb
        builder:
            cargo: ubuntu-builder
            npm: ubuntu-builder
            pixi: ubuntu-builder
        produce:
            - pixi
            - npm
            - cargo
    ubuntu-distro:
        distro:
            - ubuntu:24.04
            - ubuntu
