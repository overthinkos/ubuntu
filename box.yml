#  Per-kind file for image entries. Sibling of charly.yml — imported via
#  charly.yml's `import:` list. The schema kind discriminator is
#  `kind: image` for kind-keyed entries; root-shape map is `image:` (this file).
#  2026-05 kind-files cutover.
version: 2026.159.1912
box:
    ubuntu-debootstrap-builder:
        base: debian:13
        distro:
            - debian:13
            - debian
        build:
            - deb
        candy:
            - '@github.com/overthinkos/overthink/candy/debootstrap-builder:v2026.160.0856'
    ubuntu-debootstrap:
        # Layerless `from: builder:debootstrap` image (a bootstrap base) — needs a
        # dedicated version: the runtime requires one for a layerless image on an
        # external base, and the entity-version migrate backfills only base:-style
        # bare bases, not from:-style, so it is declared here.
        version: 2026.144.1443
        from: builder:debootstrap
        bootstrap_builder_image: ubuntu-debootstrap-builder
        distro:
            - ubuntu:24.04
            - ubuntu
        build:
            - deb
    ubuntu:
        # Bare distro base on ubuntu:24.04 (layerless) — carries a dedicated version:
        # for content-stable identity (cache stability), per the per-kind versioning.
        version: 2026.144.1443
        base: ubuntu:24.04
        distro:
            - ubuntu:24.04
            - ubuntu
        build:
            - deb
        builder:
            cargo: ubuntu-builder
            npm: ubuntu-builder
            pixi: ubuntu-builder
        produce:
            - pixi
            - npm
            - cargo
    ubuntu-builder:
        base: ubuntu
        candy:
            - '@github.com/overthinkos/overthink/candy/pixi:v2026.160.0856'
            - '@github.com/overthinkos/overthink/candy/nodejs:v2026.160.0856'
            - '@github.com/overthinkos/overthink/candy/build-toolchain:v2026.160.0856'
        produce:
            - pixi
            - npm
            - cargo
    ubuntu-coder:
        base: ubuntu
        candy:
            - '@github.com/overthinkos/overthink/candy/agent-forwarding:v2026.160.0856'
            - '@github.com/overthinkos/overthink/candy/sshd:v2026.160.0856'
            - '@github.com/overthinkos/overthink/candy/charly:v2026.160.0856'
            - '@github.com/overthinkos/overthink/candy/charly-mcp:v2026.160.0856'
            - '@github.com/overthinkos/overthink/candy/container-nesting:v2026.160.0856'
            - '@github.com/overthinkos/overthink/candy/dbus:v2026.160.0856'
            - '@github.com/overthinkos/overthink/candy/tmux:v2026.160.0856'
            - '@github.com/overthinkos/overthink/candy/language-runtimes:v2026.160.0856'
            - '@github.com/overthinkos/overthink/candy/golang:v2026.160.0856'
            - '@github.com/overthinkos/overthink/candy/nodejs:v2026.160.0856'
            - '@github.com/overthinkos/overthink/candy/rust:v2026.160.0856'
            - '@github.com/overthinkos/overthink/candy/pixi:v2026.160.0856'
            - '@github.com/overthinkos/overthink/candy/uv:v2026.160.0856'
            - '@github.com/overthinkos/overthink/candy/build-toolchain:v2026.160.0856'
            - '@github.com/overthinkos/overthink/candy/dev-tools:v2026.160.0856'
            - '@github.com/overthinkos/overthink/candy/pre-commit:v2026.160.0856'
            - '@github.com/overthinkos/overthink/candy/direnv:v2026.160.0856'
            - '@github.com/overthinkos/overthink/candy/gh:v2026.160.0856'
            - '@github.com/overthinkos/overthink/candy/typst:v2026.160.0856'
            - '@github.com/overthinkos/overthink/candy/asciinema:v2026.160.0856'
            - '@github.com/overthinkos/overthink/candy/claude-code:v2026.160.0856'
            - '@github.com/overthinkos/overthink/candy/codex:v2026.160.0856'
            - '@github.com/overthinkos/overthink/candy/gemini:v2026.160.0856'
            - '@github.com/overthinkos/overthink/candy/forgecode:v2026.160.0856'
            - '@github.com/overthinkos/overthink/candy/oracle:v2026.160.0856'
            - '@github.com/overthinkos/overthink/candy/devops-tools:v2026.160.0856'
            - '@github.com/overthinkos/overthink/candy/kubernetes:v2026.160.0856'
            - '@github.com/overthinkos/overthink/candy/docker-ce:v2026.160.0856'
            - '@github.com/overthinkos/overthink/candy/github-actions:v2026.160.0856'
            - '@github.com/overthinkos/overthink/candy/google-cloud:v2026.160.0856'
            - '@github.com/overthinkos/overthink/candy/google-cloud-npm:v2026.160.0856'
            - '@github.com/overthinkos/overthink/candy/grafana-tools:v2026.160.0856'
        port:
            - 2222:2222
            - 18765:18765
        eval:
            - command: test -x ${HOME}/.npm-global/bin/claude && test -x ${HOME}/.npm-global/bin/codex && test -x ${HOME}/.npm-global/bin/gemini && test -x ${HOME}/.npm-global/bin/forge
              id: ubuntu-coder-ai-clis
              exit_status: 0
            - command: test -x /usr/bin/go && test -x /usr/bin/node && { test -x ${HOME}/.cargo/bin/cargo || test -x /usr/bin/cargo; }
              id: ubuntu-coder-languages
              exit_status: 0
            - command: test -x /usr/bin/kubectl && test -x /usr/bin/docker && test -x /usr/local/bin/aws && test -x /usr/bin/gcloud && test -x /usr/local/bin/tofu
              id: ubuntu-coder-devops
              exit_status: 0
            - addr: 127.0.0.1:${HOST_PORT:2222}
              id: ubuntu-coder-sshd-port
              timeout: 5s
              scope: deploy
              reachable: true
            - addr: 127.0.0.1:${HOST_PORT:18765}
              id: ubuntu-coder-mcp-port
              timeout: 5s
              scope: deploy
              reachable: true
