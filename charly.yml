#  overthinkos/ubuntu — the Ubuntu image family, split out of the main
#  opencharly repo (2026-05). Mounted as a git submodule at image/ubuntu.
#
#  SINGLE-FILE config (2026-05 import-namespace cutover): every local entity
#  (the ubuntu base + debootstrap family, the ubuntu-coder/-builder images, the
#  ubuntu bootstrap VM, and the disposable eval bed) is inlined here. This repo
#  VENDORS NOTHING — every layer is an `@github.com/...` ref, and the shared
#  build-config arrives via `import:`.
#
#  import: has two shapes —
#    * flat string  → build.yml (shared distro/builder/init vocabulary), merged
#      into this repo's root namespace.
#    * `alias: ref` → a child repo mounted under a namespace.
#  Ubuntu roots on EXTERNAL bases entirely (the `ubuntu` base is docker.io
#  `ubuntu:24.04`, the debootstrap builder is `base: debian:13`), so it has NO
#  cross-repo entity refs — only the flat build.yml vocabulary import is needed.
#
#  Ubuntu is deb-family: `distro.ubuntu` is `inherits: debian` in the shared
#  build.yml (which carries BOTH the debian and ubuntu distro configs), so the
#  inheritance resolves through the single remote build.yml import. Nothing in
#  the main repo consumes any Ubuntu image, so there is NO main ↔ ubuntu
#  coupling — the only edge is ubuntu → main (layers + build.yml).
#
#  Directly buildable: `charly box build ubuntu` (the build verb defaults to this
#  charly.yml). From the parent repo: `charly -C image/ubuntu image build
#  ubuntu`, or anywhere: `charly --repo overthinkos/ubuntu image build ubuntu`.
version: 2026.159.3
defaults:
    platform:
        - linux/amd64
    tag: auto
    registry: ghcr.io/overthinkos
    build:
        - deb
    merge:
        auto: false
        max_mb: 128
import:
    # Shared build-config vocabulary (distro/builder/init) — flat root import.
    # Carries distro.ubuntu (inherits: debian) + distro.debian + the deb format
    # + the debootstrap builder template. Ubuntu roots on external bases, so no
    # namespaced (`charly`) import is needed.
    - '@github.com/overthinkos/overthink/build.yml:v2026.159.1413'
    - box.yml
    - vm.yml
    - pod.yml
    - k8s.yml
eval:
    # Disposable R10 test bed for the ubuntu bootstrap VM (kind:eval — the
    # 2026-05 deploy→eval unification moved repo-shipped disposable beds out of
    # deploy.yml). disposable: true is the sole authorization for the unattended
    # destroy+rebuild driven by `charly eval run eval-ubuntu-debootstrap-vm`.
    eval-ubuntu-debootstrap-vm:
        target: vm
        vm: ubuntu-debootstrap
        disposable: true
        lifecycle: dev
        # deb localpkg AUTO-RESOLVE witness (ubuntu): charly installed as the
        # `opencharly` .deb via localpkg (one deb source serves Debian + Ubuntu),
        # mandatory deps auto-resolved by apt from Ubuntu main. tailscale is NOT in
        # the .deb — the charly candy supplies it via the tailscale apt repo (noble), so
        # it must ALSO be present after deploy.
        add_candy:
            - '@github.com/overthinkos/overthink/candy/charly:v2026.159.1413'
        install_opts:
            allow_repo_changes: true
            allow_root_tasks: true
            skip_incompatible: true # skip composed layers lacking a guest-format section; the localpkg .deb/.rpm Depends/Requires install the packages
        eval:
            - id: localpkg-deb-autoresolve
              scope: deploy
              description: charly installed as the opencharly .deb via localpkg, mandatory deps auto-resolved by apt; tailscale supplied by the charly layer
              command: |
                dpkg -s opencharly >/dev/null 2>&1 &&
                dpkg -s podman >/dev/null 2>&1 &&
                dpkg -s libvirt-daemon-system >/dev/null 2>&1 &&
                dpkg -s tailscale >/dev/null 2>&1 &&
                command -v charly >/dev/null 2>&1 &&
                charly version &&
                echo LOCALPKG-DEB-AUTORESOLVE-OK
              stdout:
                - contains: LOCALPKG-DEB-AUTORESOLVE-OK
              exit_status: 0
            # distro-cascade witness: the per-distro cascade must resolve the
            # UBUNTU (noble) tailscale apt repo on this ubuntu guest — deterministically,
            # NOT debian/trixie. The VM chain [ubuntu:24.04, ubuntu] (distroTagChain)
            # matches candy/charly's `ubuntu` tag section. This is the original
            # non-deterministic-collapse bug fixed and proven on a live VM.
            - id: tailscale-repo-suite-ubuntu-noble
              scope: deploy
              description: distro-cascade resolves the ubuntu/noble tailscale apt repo (not debian/trixie) deterministically
              command: grep -h 'pkgs[.]tailscale[.]com/stable/ubuntu noble' /etc/apt/sources.list.d/tailscale.list
              exit_status: 0
