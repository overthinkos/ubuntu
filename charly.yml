#  overthinkos/ubuntu — the Ubuntu image family, split out of the main
#  opencharly repo (2026-05). Mounted as a git submodule at box/ubuntu.
#
#  SINGLE-FILE config (2026-05 import-namespace cutover): every local entity
#  (the ubuntu base + debootstrap family, the ubuntu-coder/-builder images, the
#  ubuntu bootstrap VM, and the disposable check bed) is inlined here. This repo
#  VENDORS NOTHING — every layer is an `@github.com/...` ref into main's shared
#  candy library, and the shared build-config (distro/builder/init vocabulary) is
#  EMBEDDED in the `charly` binary (`charly/charly.yml`) — not imported.
#
#  import: is EMPTY here (`import: []`). Ubuntu roots on EXTERNAL bases entirely
#  (the `ubuntu` base is docker.io `ubuntu:24.04`, the debootstrap builder is
#  `base: debian:13`), so it has NO cross-repo entity refs — and with the build
#  vocabulary embedded in the binary, it imports NOTHING.
#
#  Ubuntu is deb-family: `distro.ubuntu` is `inherits: debian` in the EMBEDDED
#  build vocabulary (`charly/charly.yml`, which carries BOTH the debian and ubuntu
#  distro configs), so the inheritance resolves from the embedded vocab. Nothing
#  in the main repo consumes any Ubuntu image, so there is NO main ↔ ubuntu
#  coupling — the only edge is ubuntu → main's shared candy layers via `@github` refs.
#
#  Directly buildable: `charly box build ubuntu` (the build verb defaults to this
#  charly.yml). From the parent repo: `charly -C box/ubuntu box build
#  ubuntu`, or anywhere: `charly --repo overthinkos/ubuntu box build ubuntu`.
version: 2026.173.2300
defaults:
    platform:
        - linux/amd64
    tag: auto
    registry: ghcr.io/overthinkos
    build:
        - deb
    merge:
        auto: false
        max_mb: 128
import: []
# Disposable R10 test bed for the ubuntu bootstrap VM (kind:check — the
# 2026-05 deploy→check unification moved repo-shipped disposable beds out of
# deploy.yml). disposable: true is the sole authorization for the unattended
# destroy+rebuild driven by `charly check run check-ubuntu-debootstrap-vm`.
check-ubuntu-debootstrap-vm:
    vm:
        from: ubuntu-debootstrap
        disposable: true
        lifecycle: dev
        description: Sole proof the charly toolchain installs as the opencharly .deb via localpkg on a from-scratch debootstrap Ubuntu 24.04 VM, with apt auto-resolving deps and the distro-cascade deterministically picking the ubuntu/noble tailscale repo (not debian/trixie). Boots the ubuntu-debootstrap VM under libvirt/QEMU (UEFI-insecure, q35, ext4, ssh 12229), overlays the charly candy via add_candy, then runs two guest command checks — dpkg -s opencharly/podman/libvirt-daemon-system/tailscale plus charly version (LOCALPKG-DEB-AUTORESOLVE-OK), and grep of tailscale.list for 'stable/ubuntu noble'.
    check-ubuntu-debootstrap-vm-add_candy:
        # deb localpkg AUTO-RESOLVE witness (ubuntu): charly installed as the
        # `opencharly` .deb via localpkg (one deb source serves Debian + Ubuntu),
        # mandatory deps auto-resolved by apt from Ubuntu main. tailscale is NOT in
        # the .deb — the charly candy supplies it via the tailscale apt repo (noble), so
        # it must ALSO be present after deploy.
        add_candy:
            - '@github.com/overthinkos/overthink/candy/charly:v2026.170.1105'
    check-ubuntu-debootstrap-vm-install_opts:
        install_opts:
            allow_repo_changes: true
            allow_root_tasks: true
            skip_incompatible: true # skip composed layers lacking a guest-format section; the localpkg .deb/.rpm Depends/Requires install the packages
    localpkg-deb-autoresolve:
        check: |
            command=dpkg -s opencharly >/dev/null 2>&1 &&
            dpkg -s podman >/dev/null 2>&1 &&
            dpkg -s libvirt-daemon-system >/dev/null 2>&1 &&
            dpkg -s tailscale >/dev/null 2>&1 &&
            command -v charly >/dev/null 2>&1 &&
            charly version &&
            echo LOCALPKG-DEB-AUTORESOLVE-OK
        id: localpkg-deb-autoresolve
        description: charly installed as the opencharly .deb via localpkg, mandatory deps auto-resolved by apt; tailscale supplied by the charly layer
        command: |
            dpkg -s opencharly >/dev/null 2>&1 &&
            dpkg -s podman >/dev/null 2>&1 &&
            dpkg -s libvirt-daemon-system >/dev/null 2>&1 &&
            dpkg -s tailscale >/dev/null 2>&1 &&
            command -v charly >/dev/null 2>&1 &&
            charly version &&
            echo LOCALPKG-DEB-AUTORESOLVE-OK
        stdout:
            - contains: LOCALPKG-DEB-AUTORESOLVE-OK
        exit_status: 0
        context:
            - runtime
    tailscale-repo-suite-ubuntu-noble:
        check: command=grep -h 'pkgs[.]tailscale[.]com/stable/ubuntu noble' /etc/apt/sources.list.d/tailscale.list
        id: tailscale-repo-suite-ubuntu-noble
        description: distro-cascade resolves the ubuntu/noble tailscale apt repo (not debian/trixie) deterministically
        command: grep -h 'pkgs[.]tailscale[.]com/stable/ubuntu noble' /etc/apt/sources.list.d/tailscale.list
        exit_status: 0
        context:
            - runtime
# Disposable R10 pod bed for the ubuntu-coder image (kind:check, target:pod) —
# the pod x ubuntu cross-cell the bootstrap-VM bed above does not cover. Mirrors
# check-fedora-coder-pod on the deb substrate; ports auto-allocate on 127.0.0.1
# at deploy (no port: pin), so a run never collides with a production deploy or a
# concurrent bed. The composed candies' baked file/package/service/command checks
# (incl. the noble exclude_distros package divergences) run via `charly check
# live`; this bed adds a host-side status assertion + a noble base-identity probe.
check-ubuntu-coder-pod:
    pod:
        image: ubuntu-coder
        disposable: true
        lifecycle: dev
        description: R10 bed for the ubuntu-coder image — proves the Ubuntu developer pod (sshd + language runtimes + AI CLIs on the Ubuntu 24.04 noble base) builds and runs as one composed pod. Builds box:ubuntu-coder, deploys, runs the composed baked file/package/service/command checks + charly status --json, and exercises the noble exclude_distros package divergences.
    status-shows-pod:
        check: command=charly status --json
        id: status-shows-pod
        command: charly status --json
        in_container: false
        stdout:
            - contains: '"kind": "pod"'
            - contains: check-ubuntu-coder-pod
        context:
            - runtime
    noble-base-identity:
        check: the guest base is Ubuntu noble (not Debian)
        id: noble-base-identity
        command: grep -q 'VERSION_CODENAME=noble' /etc/os-release
        exit_status: 0
        context:
            - runtime
ubuntu-debootstrap:
    vm:
        # Bootstrap-from-scratch via debootstrap inside the ubuntu-debootstrap-
        # builder container, then booted under libvirt/QEMU. The debootstrap
        # builder template + distro.ubuntu config (which inherits debian) resolve
        # from the embedded build vocabulary (`charly/charly.yml`).
        source:
            kind: bootstrap
            builder: debootstrap
            builder_image: ubuntu-debootstrap-builder
            distro: ubuntu
            package:
                - sudo
                - openssh-server
                - qemu-guest-agent
                - cloud-init
            rootfs: ext4
            kernel_args: console=tty0 console=ttyS0,115200
        disk_size: 20G
        ram: 4G
        cpu: 2
        machine: q35
        firmware: uefi-insecure
        network:
            mode: user
        ssh:
            user: ubuntu
            # 12229 (not 12228): the cachyos-gpu operator VM forwards host
            # 12228; the disposable ubuntu bed moves so it can run alongside
            # the operator. See the project CHANGELOG/2026-05.md (VM host-port deconfliction).
            port: 12229
            key_source: generate
        cloud_init:
            # The ubuntu account (sudo NOPASSWD + /bin/bash + ssh key +
            # wheel/sudo) is provisioned from ssh.user via the cloud-init
            # create-pattern (composeUsers), so no explicit users: block is
            # needed here.
            runcmd:
                - systemctl enable --now ssh
                - systemctl enable --now qemu-guest-agent
                - "{ ip a; echo ===listen===; ss -tlnp; echo ===ssh===; systemctl status ssh --no-pager; } > /boot/charly-diag.txt 2>&1"
discover:
    - path: box
      recursive: true
    - path: candy
      recursive: true
